<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Aqsam ERP — Professional Suite</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#0D1B2A"/>
<link rel="icon" href="./icon-192.png"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Aqsam ERP"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:13px;-webkit-font-smoothing:antialiased}
:root{--navy:#0D1B2A;--navy2:#1A2F45;--amber:#F59E0B;--amberdk:#B45309;--green:#10B981;--red:#EF4444;--blue:#3B82F6;--slate:#F0F4FA;--bdr:rgba(13,27,42,0.09);--heading:#0D1B2A;--bg:#F0F4FA;--card:#fff;--card2:#fafbfc;--text:#0D1B2A;--muted:#6b7280;--row-hover:#F0F4FA;--inp-bg:#fff;--inp-br:rgba(13,27,42,.15)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
#auth{min-height:100vh;background:var(--slate);display:flex;align-items:center;justify-content:center;padding:16px}
.aw{width:100%;max-width:420px;animation:fadeUp .3s ease}
.alogo{text-align:center;margin-bottom:22px}
.alogo-box{width:36px;height:36px;background:var(--navy);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-right:8px}
.alogo-name{font-size:22px;font-weight:700;color:var(--heading);letter-spacing:-.5px;vertical-align:middle}
.alogo-sub{font-size:10.5px;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.acard{background:#fff;border-radius:13px;border:.5px solid var(--bdr);padding:22px;margin-bottom:12px}
.atabs{display:flex;gap:3px;background:var(--slate);border-radius:8px;padding:3px;margin-bottom:17px}
.atab{flex:1;padding:7px;text-align:center;font-size:12.5px;cursor:pointer;border-radius:6px;color:#6b7280;font-weight:500;transition:all .12s}
.atab.on{background:#fff;color:var(--heading);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.aerr{background:#fef2f2;border:.5px solid #fca5a5;border-radius:7px;padding:8px 12px;font-size:12px;color:#991b1b;margin-bottom:11px;display:none}
.afields{display:flex;flex-direction:column;gap:10px}
.lbl{font-size:11.5px;color:#6b7280;display:block;margin-bottom:4px;font-weight:500}
.ainp{width:100%;padding:9px 11px;border:1px solid rgba(13,27,42,.15);border-radius:8px;font-size:13px;color:var(--heading);outline:none;font-family:inherit}
.ainp:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,27,42,.07)}
.abtn{width:100%;padding:10px;border-radius:8px;background:var(--navy);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:2px}
.abtn:hover{background:var(--navy2)}.abtn:disabled{opacity:.5;cursor:not-allowed}
.dchips{display:flex;flex-direction:column;gap:6px}
.dchip{padding:8px 11px;border-radius:8px;border:1px solid rgba(13,27,42,.12);background:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .1s}
.dchip:hover{background:var(--slate);border-color:var(--navy)}
.davt{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
#app{display:none;height:100vh;overflow:hidden}
#app.on{display:flex}
#sb{width:220px;min-width:220px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden;transition:width .2s,min-width .2s;flex-shrink:0}
#sb.col{width:0;min-width:0}
.sbh{padding:13px 12px 10px;border-bottom:.5px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden}
.sblbox{width:27px;height:27px;background:rgba(245,158,11,.16);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbname{color:#fff;font-size:13.5px;font-weight:700;letter-spacing:-.3px}
.sborg{color:rgba(255,255,255,.3);font-size:9px;letter-spacing:.5px;text-transform:uppercase}
.sbnav{flex:1;overflow-y:auto;padding:8px 0}
.sbnav::-webkit-scrollbar{width:2px}.sbnav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.nsec{color:rgba(255,255,255,.2);font-size:8px;letter-spacing:1.2px;text-transform:uppercase;padding:9px 12px 3px;white-space:nowrap;font-weight:700}
.ni{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;color:rgba(255,255,255,.48);font-size:12px;border-left:2.5px solid transparent;transition:all .1s;user-select:none;white-space:nowrap;font-weight:500}
.ni:hover{color:rgba(255,255,255,.82);background:rgba(255,255,255,.04)}
.ni.on{color:var(--amber);background:rgba(245,158,11,.09);border-left-color:var(--amber)}
.nic{font-size:13px;width:15px;text-align:center;flex-shrink:0}
.nbadge{background:var(--red);color:#fff;font-size:8px;padding:1px 5px;border-radius:6px;margin-left:auto;font-weight:700}
.nbadge.am{background:var(--amber)}
.sbfoot{padding:10px 12px;border-top:.5px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px;white-space:nowrap}
.fav{width:27px;height:27px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--heading);flex-shrink:0}
#tb{background:var(--card);border-bottom:.5px solid var(--bdr);padding:0 16px;display:flex;align-items:center;gap:9px;height:46px;flex-shrink:0}
.tbt{font-size:13px;font-weight:700;color:var(--heading)}
.tbfy{font-size:10.5px;color:#9ca3af;background:var(--slate);padding:3px 9px;border-radius:5px;border:.5px solid var(--bdr);font-weight:500}
.tbr{margin-left:auto;display:flex;gap:6px;align-items:center}
.audbadge{font-size:10.5px;background:rgba(16,185,129,.08);color:#064e3b;padding:3px 9px;border-radius:5px;border:.5px solid rgba(16,185,129,.2);display:flex;align-items:center;gap:4px;font-weight:500}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
.fy-sel{font-size:11px;padding:4px 8px;border:.5px solid var(--bdr);border-radius:6px;background:#fff;color:var(--heading);cursor:pointer;font-family:inherit;font-weight:500}
.btn{padding:5px 11px;border-radius:6px;font-size:11.5px;font-weight:500;cursor:pointer;border:.5px solid var(--bdr);background:var(--card);color:var(--text);font-family:inherit;transition:background .1s}
.btn:hover{background:var(--slate)}
.btnp{background:var(--navy);color:#fff;border-color:var(--navy)}.btnp:hover{background:var(--navy2)}
.btna{background:var(--amber);color:#fff;border-color:var(--amberdk)}.btna:hover{background:var(--amberdk)}
.btng{background:rgba(16,185,129,.1);color:#064e3b;border:.5px solid rgba(16,185,129,.25)}
.btnr{background:rgba(239,68,68,.1);color:#7f1d1d;border:.5px solid rgba(239,68,68,.25)}
.btnsm{font-size:11px;padding:3px 9px}
.btnxs{font-size:10.5px;padding:2px 7px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#content{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}
#content::-webkit-scrollbar{width:4px}#content::-webkit-scrollbar-thumb{background:rgba(13,27,42,.12);border-radius:2px}
.view{display:none;animation:fadeUp .18s ease}.view.on{display:block}
.card{background:var(--card);border:.5px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:13px}
.ch{padding:9px 14px;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;background:var(--card2)}
.ct{font-size:12.5px;font-weight:700;color:var(--heading)}
.clink{font-size:11px;color:#9ca3af;cursor:pointer;background:none;border:none;font-family:inherit;font-weight:500}.clink:hover{color:var(--heading)}
.inp{padding:6px 9px;border:.5px solid rgba(13,27,42,.15);border-radius:6px;font-size:12px;background:var(--inp-bg);color:var(--text);outline:none;font-family:inherit}
.inp:focus{border-color:var(--navy)}.inplg{padding:8px 10px;font-size:13px}select.inp{cursor:pointer}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;display:inline-block;white-space:nowrap;font-weight:600}
.tg{background:rgba(16,185,129,.1);color:#064e3b}
.ty{background:rgba(245,158,11,.1);color:#78350f}
.tr{background:rgba(239,68,68,.1);color:#7f1d1d}
.tb{background:rgba(99,102,241,.1);color:#312e81}
.tm{background:rgba(107,114,128,.12);color:#374151}
.gt{width:100%;border-collapse:collapse}
.gt th{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:#9ca3af;font-weight:700;padding:7px 14px;border-bottom:.5px solid var(--bdr);text-align:left;white-space:nowrap;background:var(--card2)}
.gt td{padding:8px 14px;border-bottom:.5px solid var(--bdr);font-size:12px;color:var(--text);vertical-align:middle}
.gt tr:last-child td{border-bottom:none}
.gt tbody tr{cursor:pointer}.gt tbody tr:hover td{background:var(--row-hover)}
.mono{font-family:monospace;font-size:10.5px;color:#6b7280}
.num{font-variant-numeric:tabular-nums;font-weight:600}
.grn{color:var(--green)}.red{color:var(--red)}.mut{color:#9ca3af;font-size:11px;font-weight:500}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kc{background:var(--card);border:.5px solid var(--bdr);border-radius:10px;padding:13px 14px}
.kl{font-size:9.5px;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;font-weight:700}
.kv{font-size:19px;font-weight:700;color:var(--heading);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.kd{font-size:10.5px;margin-top:5px;font-weight:500}
.fg{display:grid;gap:11px}.fg2{grid-template-columns:1fr 1fr}.fg3{grid-template-columns:1fr 1fr 1fr}
.fr{display:flex;flex-direction:column;gap:4px}.fr label{font-size:11px;color:#6b7280;font-weight:600}.fr .inp,.fr select,.fr textarea{width:100%}
textarea.inp{resize:vertical;min-height:58px}
#mbg{position:fixed;inset:0;background:rgba(0,0,0,.34);z-index:600;display:none;align-items:center;justify-content:center;padding:16px}
#mbg.on{display:flex}
.modal{background:var(--card);border-radius:13px;width:100%;max-height:92vh;overflow-y:auto;animation:fadeUp .18s ease;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.mhd{padding:16px 18px 12px;border-bottom:.5px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--card);z-index:1}
.mtit{font-size:14px;font-weight:700;color:var(--heading)}.msub{font-size:11px;color:#9ca3af;margin-top:2px}
.mbody{padding:16px 18px}.mfoot{padding:11px 18px 15px;border-top:.5px solid var(--bdr);display:flex;gap:7px;flex-wrap:wrap}
#tc{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--navy);color:#fff;padding:9px 13px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:6px;min-width:220px;box-shadow:0 4px 16px rgba(0,0,0,.18);animation:slideIn .2s ease;font-weight:500}
.tok{background:#064e3b}.ter{background:#7f1d1d}
.srow{display:flex;padding:8px 14px;border-bottom:.5px solid var(--bdr);font-size:12px;gap:12px}
.srow:last-child{border-bottom:none}
.slbl{color:#6b7280;flex:1;font-weight:500}.sval{font-weight:600;color:var(--heading);font-variant-numeric:tabular-nums}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.vtabs{display:flex;gap:3px;background:var(--slate);border-radius:7px;padding:3px;margin-bottom:13px;width:fit-content}
.vtab{padding:4px 12px;border-radius:5px;font-size:11.5px;cursor:pointer;color:#6b7280;font-weight:500;transition:all .12s}
.vtab.on{background:#fff;color:var(--heading);box-shadow:0 1px 3px rgba(0,0,0,.07);border:.5px solid var(--bdr)}
.pbar{background:var(--slate);border-radius:4px;height:6px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .4s ease}
.banner{border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:13px;font-size:12px;font-weight:500}
.bwarn{background:rgba(245,158,11,.07);border:.5px solid rgba(245,158,11,.25)}
.binfo{background:rgba(59,130,246,.07);border:.5px solid rgba(59,130,246,.22)}
.bok{background:rgba(16,185,129,.07);border:.5px solid rgba(16,185,129,.22)}
.berr{background:rgba(239,68,68,.07);border:.5px solid rgba(239,68,68,.22)}
.ef{display:flex;flex-direction:column;gap:2px}
.el{font-size:9.5px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.ev{font-size:12px;color:var(--heading);font-weight:500}
.att-item{background:var(--slate);border:.5px solid var(--bdr);border-radius:6px;padding:7px 10px;display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px}
.fs-co{text-align:center;padding:16px 14px 12px;border-bottom:.5px solid var(--bdr)}
.fs-co-name{font-size:14px;font-weight:700;color:var(--heading)}
.fs-co-sub{font-size:11px;color:#6b7280;margin-top:2px}
.fs-wrap{padding:4px 14px 14px;font-size:11.5px}
.fs-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#fff;background:var(--navy);padding:6px 10px;border-radius:5px;margin:14px 0 6px}
.fsg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:0}
.fsg.hdr{border-bottom:1.5px solid var(--navy);padding-bottom:5px;margin-bottom:2px}
.fsg.hdr span{font-weight:700;font-size:10.5px;text-align:right;color:var(--heading)}
.fsg.hdr span:first-child{text-align:left}
.fsg.row{padding:5px 0;border-bottom:.5px solid rgba(13,27,42,.05)}
.fsg.row span{text-align:right;font-variant-numeric:tabular-nums}
.fsg.row span:first-child{text-align:left}
.fsg.ind span:first-child{padding-left:18px;color:#6b7280;font-size:11px}
.fsg.sub{padding:6px 0;border-bottom:.5px solid rgba(13,27,42,.18)}
.fsg.sub span{font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.fsg.sub span:first-child{text-align:left}
.fsg.tot{padding:8px 10px;margin:4px -14px;background:rgba(13,27,42,.05);border-top:1px solid var(--navy);border-bottom:1px solid var(--navy)}
.fsg.tot span{font-weight:700;font-size:12px;text-align:right;font-variant-numeric:tabular-nums;color:var(--heading)}
.fsg.tot span:first-child{text-align:left}
.fsg.grand{padding:9px 10px;margin:6px -14px 0;background:var(--navy);border-radius:0 0 10px 10px}
.fsg.grand span{font-weight:700;font-size:12px;text-align:right;color:#fff;font-variant-numeric:tabular-nums}
.fsg.grand span:first-child{text-align:left}
.fsg.soce{grid-template-columns:2fr 1fr 1fr 1fr 1fr}
.fs-note{font-size:10px;color:#9ca3af;text-align:center;padding:10px 0 0;margin-top:8px;border-top:.5px solid var(--bdr)}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:.5px solid var(--bdr)}
.mini-kpi{padding:9px 14px;border-right:.5px solid var(--bdr);border-bottom:.5px solid var(--bdr)}
.mini-kpi:nth-child(even){border-right:none}
.mini-kpi:nth-last-child(-n+2){border-bottom:none}
.mini-lbl{font-size:9.5px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:4px}
.mini-val{font-size:14px;font-weight:700;color:var(--heading);font-variant-numeric:tabular-nums}
@media(max-width:720px){.kg{grid-template-columns:1fr 1fr}.g2,.g3{grid-template-columns:1fr}.fsg{grid-template-columns:2fr 1fr}}
[data-theme=dark]{--bg:#0f1923;--card:#1a2535;--card2:#1e2d42;--text:#e2e8f0;--muted:#8899aa;--bdr:rgba(255,255,255,0.07);--slate:#131f2e;--row-hover:#1e2d42;--inp-bg:#1e2d42;--inp-br:rgba(255,255,255,.12);--heading:#f0f4f8}
[data-theme=dark] .acard,[data-theme=dark] .atab.on,[data-theme=dark] .dchip,[data-theme=dark] .fy-sel,[data-theme=dark] .vtab.on{background:var(--card)}
[data-theme=dark] .aerr{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#fca5a5}
[data-theme=dark] .ainp{color:var(--text);background:var(--inp-bg);border-color:var(--inp-br)}
[data-theme=dark] #auth{background:var(--bg)}
[data-theme=dark] .kc,[data-theme=dark] .acard{border-color:var(--bdr)}
[data-theme=dark] .tg{background:rgba(16,185,129,.16);color:#6ee7b7}
[data-theme=dark] .ty{background:rgba(245,158,11,.16);color:#fcd34d}
[data-theme=dark] .tr{background:rgba(239,68,68,.16);color:#fca5a5}
[data-theme=dark] .tb{background:rgba(99,102,241,.18);color:#a5b4fc}
[data-theme=dark] .tm{background:rgba(148,163,184,.18);color:#cbd5e1}
[data-theme=dark] .btng{background:rgba(16,185,129,.14);color:#6ee7b7}
[data-theme=dark] .btnr{background:rgba(239,68,68,.14);color:#fca5a5}
[data-theme=dark] .audbadge{background:rgba(16,185,129,.12);color:#6ee7b7}
body{transition:background .2s,color .2s}
.card{transition:background .2s,border-color .2s}
@media print{
  body{overflow:visible!important;background:#fff!important}
  #sb,#tb,#mbg,#tc,#api-bar,.btn,.audbadge{display:none!important}
  #main{margin:0!important;width:100%!important}
  #content{padding:0!important;overflow:visible!important}
  .card{box-shadow:none!important;border:none!important}
}
</style>
</head>
<body>
<div id="api-bar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#7f1d1d;color:#fff;font-size:12px;font-weight:600;padding:7px 16px;text-align:center;">⚠ Server offline — using local IndexedDB. Changes are saved locally.</div>
<div id="auth">
  <div class="aw">
    <div class="alogo">
      <span class="alogo-box"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" fill="#F59E0B"/><rect x="11" y="2" width="7" height="7" rx="1.5" fill="rgba(255,255,255,.4)"/><rect x="2" y="11" width="7" height="7" rx="1.5" fill="rgba(255,255,255,.4)"/><rect x="11" y="11" width="7" height="7" rx="1.5" fill="#10B981"/></svg></span>
      <span class="alogo-name">Aqsam</span>
      <div class="alogo-sub">Professional ERP &middot; IFRS &middot; IndexedDB</div>
    </div>
    <div class="acard">
      <div class="atabs"><div class="atab on" onclick="swTab('si')">Sign in</div><div class="atab" onclick="swTab('su')">Create account</div></div>
      <div class="aerr" id="aerr"></div>
      <div class="afields">
        <div id="af-n" style="display:none"><label class="lbl">Full name</label><input class="ainp" id="ai-n" placeholder="Sara Rashid"/></div>
        <div id="af-o" style="display:none"><label class="lbl">Organisation</label><input class="ainp" id="ai-o" placeholder="Al-Noor Group"/></div>
        <div id="af-r" style="display:none"><label class="lbl">Role</label><select class="ainp" id="ai-r"><option>CFO</option><option selected>Accountant</option><option>Auditor</option><option>Manager</option><option>Viewer</option></select></div>
        <div><label class="lbl">Email</label><input class="ainp" id="ai-e" type="email" placeholder="you@company.com" onkeydown="if(event.key==='Enter')asub()"/></div>
        <div><label class="lbl">Password</label><input class="ainp" id="ai-p" type="password" placeholder="password" onkeydown="if(event.key==='Enter')asub()"/></div>
        <button class="abtn" id="asbtn" onclick="asub()">Sign in to Aqsam</button>
      </div>
    </div>
    <div class="acard" style="padding:13px 17px">
      <div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px;font-weight:600">Demo accounts &mdash; data persists in browser</div>
      <div class="dchips" id="dchips"></div>
      <div style="text-align:center;margin-top:10px;font-size:10.5px;color:#9ca3af">Password: <strong style="color:#6b7280">demo123</strong></div>

var _ws = null;
var _wsReconnectTimer = null;

function _wsConnect() {
  if (!API_URL) { var b=document.getElementById('ws-badge'); if(b){b.textContent='○ Local only';b.style.color='#9ca3af';} return; }
  try {
    var wsUrl = API_URL.replace(/^http/, 'ws');
    _ws = new WebSocket(wsUrl);

    _ws.onopen = function() {
      clearTimeout(_wsReconnectTimer);
      // Authenticate the WS connection
      if (_jwt) _ws.send(JSON.stringify({ type: 'auth', token: _jwt }));
      console.log('[Aqsam WS] Connected');
      var badge = document.getElementById('ws-badge');
      if (badge) { badge.textContent = '⚡ Live'; badge.style.color = '#10B981'; }
    };

    _ws.onmessage = function(e) {
      var msg = JSON.parse(e.data);
      if (msg.type === 'auth_ok') return;

      // Handle real-time events
      if (msg.type === 'txn:new') {
        var t = msg.data;
        var local = {id:t.ref,ref:t.ref,desc:t.description,acct:t.account,
          dr:t.amount<0?Math.abs(t.amount):0,cr:t.amount>0?t.amount:0,
          date:t.txn_date,status:t.status,by:t.posted_by_name||'Server',att:[],hash:t.hash,fy:t.fy_year,_sid:t.id};
        S.txns.unshift(local);
        _showLiveToast('📥 New transaction: ' + t.description);
        if (G.view==='ledger'||G.view==='dashboard') setView(G.view);
      }
      if (msg.type === 'txn:updated') {
        var t = msg.data;
        var idx = S.txns.findIndex(function(x){return x.ref===t.ref||x._sid===t.id;});
        if (idx > -1) { S.txns[idx].status = t.status; if(G.view==='ledger'||G.view==='dashboard') setView(G.view); }
        _showLiveToast('✅ Transaction updated: ' + (t.ref||''));
      }
      if (msg.type === 'invoice:new') { _syncFromServer(); _showLiveToast('📄 New invoice created'); }
      if (msg.type === 'invoice:updated') { _syncFromServer(); }
      if (msg.type === 'bill:new') { _syncFromServer(); _showLiveToast('📋 New bill recorded'); }
      if (msg.type === 'bill:updated') { _syncFromServer(); }
      if (msg.type === 'txn:voided') {
        var idx2 = S.txns.findIndex(function(x){return x._sid==msg.data.id;});
        if (idx2>-1) S.txns[idx2].status = 'void';
        if (G.view==='ledger') setView('ledger');
      }
    };

    _ws.onclose = function() {
      console.log('[Aqsam WS] Disconnected — reconnecting in 5s');
      var badge = document.getElementById('ws-badge');
      if (badge) { badge.textContent = '○ Offline'; badge.style.color = '#9ca3af'; }
      _wsReconnectTimer = setTimeout(_wsConnect, 5000);
    };

    _ws.onerror = function() { _ws.close(); };

  } catch(e) { console.warn('[Aqsam WS] Could not connect:', e.message); }
}

async function emailInvoice(invId, toEmail) {
  if (!invId) { toast('er', 'No invoice selected.'); return; }
  var email = toEmail || prompt('Send invoice to email address:');
  if (!email) return;
  if (API_URL) {
    var r = await api('POST', '/api/invoices/' + invId + '/send-email', { to: email });
    if (r && r.ok) { toast('ok', 'Invoice emailed to ' + email + ' ✓'); return; }
    if (r) { toast('er', r.data.error || 'Email failed'); return; }
  }
  // No server (or server unreachable): open the user's own email client with a prefilled invoice summary
  var i = S.invoices.find(function(x){ return x.id === invId || x._sid === invId; });
  var tot = i ? i.items.reduce(function(s,x){ return s + x.qty*x.rate; }, 0) : 0;
  var subject = 'Invoice ' + (i ? i.id : invId) + ' from ' + (co().name || 'Al-Noor Group');
  var body = i ? ('Dear ' + cn(i.cust) + ',\n\nPlease find your invoice details below:\n\nInvoice: ' + i.id + '\nDate: ' + fmtD(i.date) + '\nDue: ' + fmtD(i.due) + '\nAmount: ' + fmt(tot) + ' ' + i.cur + '\n\nThank you.') : 'Please find attached your invoice.';
  window.location.href = 'mailto:' + encodeURIComponent(email) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  addLog('Emailed invoice #' + (i ? i.id : invId) + ' via mail client', 'exported');
  toast('ok', 'Opening your email client to send to ' + email + '…');
}


var API_URL = localStorage.getItem('aqsam_api') || '';
var _jwt = localStorage.getItem('aqsam_jwt') || '';

async function api(method, path, body) {
  if (!API_URL) return null; // no server configured — pure local/offline mode, skip the network call entirely
  try {
    var r = await fetch(API_URL + path, {
      method: method,
      headers: { 'Content-Type':'application/json', 'Authorization': _jwt ? 'Bearer '+_jwt : '' },
      body: body ? JSON.stringify(body) : undefined
    });
    if (r.status === 401) { _jwt=''; localStorage.removeItem('aqsam_jwt'); logout(); return null; }
    var data = await r.json().catch(function(){return {};});
    document.getElementById('api-bar').style.display = 'none';
    return { ok: r.ok, status: r.status, data: data };
  } catch(e) {
    document.getElementById('api-bar').style.display = 'block';
    return null;
  }
}


// ── INDEXEDDB ────────────────────────────────────────────────
var DB=null;
var STORES=['users','txns','invoices','bills','customers','vendors','employees','payrolls','inventory','assets','expenses','projects','journals','audit','settings'];

function initDB(cb){
  var req=indexedDB.open('AqsamERP2',1);
  req.onupgradeneeded=function(e){
    var db=e.target.result;
    STORES.forEach(function(s){if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'});});
  };
  req.onsuccess=function(e){DB=e.target.result;seedIfEmpty(cb);};
  req.onerror=function(){cb();};
}
function dbPut(store,obj,cb){
  if(!DB){if(cb)cb();return;}
  var tx=DB.transaction(store,'readwrite');
  tx.objectStore(store).put(obj);
  tx.oncomplete=function(){if(cb)cb();};
}
function dbGetAll(store,cb){
  if(!DB){cb([]);return;}
  var req=DB.transaction(store,'readonly').objectStore(store).getAll();
  req.onsuccess=function(){cb(req.result||[]);};
  req.onerror=function(){cb([]);};
}
function dbDelete(store,id,cb){
  if(!DB){if(cb)cb();return;}
  var tx=DB.transaction(store,'readwrite');
  tx.objectStore(store).delete(id);
  tx.oncomplete=function(){if(cb)cb();};
}

// ── IN-MEMORY STORE ──────────────────────────────────────────
var S={users:[],txns:[],invoices:[],bills:[],customers:[],vendors:[],employees:[],payrolls:[],inventory:[],assets:[],expenses:[],projects:[],journals:[],audit:[],settings:[]};

function save(store,obj,cb){
  S[store]=S[store].filter(function(x){return x.id!==obj.id;});
  S[store].push(obj);
  dbPut(store,obj,cb);
  if(API_URL&&STORES.indexOf(store)>-1){
    api('PUT','/api/data/'+store+'/'+encodeURIComponent(obj.id),obj).catch(function(){});
  }
}
function del(store,id,cb){
  S[store]=S[store].filter(function(x){return x.id!==id;});
  dbDelete(store,id,cb);
  if(API_URL&&STORES.indexOf(store)>-1){
    api('DELETE','/api/data/'+store+'/'+encodeURIComponent(id)).catch(function(){});
  }
  setTimeout(function(){setView(G.view);},80);
}
function loadAll(cb){
  var pending=STORES.length;
  STORES.forEach(function(store){
    dbGetAll(store,function(rows){S[store]=rows;if(--pending===0)cb();});
  });
}

async function asub(){
  E('aerr').style.display='none';
  var email=E('ai-e').value.trim(),pw=E('ai-p').value,btn=E('asbtn');
  if(authMode==='si'){
    if(!email||!pw){showAerr('Fill in all fields.');return;}
    btn.disabled=true;btn.textContent='Signing in...';
    var r=await api('POST','/api/auth/login',{email:email,password:pw});
    if(r&&r.ok){
      _jwt=r.data.token;localStorage.setItem('aqsam_jwt',_jwt);
      var u=r.data.user;u.ini=u.initials||(u.name||'').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();u.pw=pw;
      doLogin(u);
    }else if(r&&!r.ok){
      showAerr(r.data.error||'Incorrect email or password.');btn.disabled=false;btn.textContent='Sign in to Aqsam';
    }else{
      var u2=S.users.find(function(u){return u.email.toLowerCase()===email.toLowerCase()&&u.pw===pw;});
      if(u2){toast('ok','Offline mode');doLogin(u2);}
      else{showAerr('Server unreachable. Try a demo account.');btn.disabled=false;btn.textContent='Sign in to Aqsam';}
    }
  }else{
    var name=E('ai-n').value.trim(),org=E('ai-o').value.trim(),role=E('ai-r').value;
    if(!name||!email||!pw||!org){showAerr('Fill in all fields.');return;}
    if(pw.length<6){showAerr('Password must be 6+ characters.');return;}
    btn.disabled=true;btn.textContent='Creating...';
    var r2=await api('POST','/api/auth/register',{name:name,email:email,password:pw,role:role,org:org});
    if(r2&&r2.ok){
      _jwt=r2.data.token;localStorage.setItem('aqsam_jwt',_jwt);
      var nu=r2.data.user;nu.ini=nu.initials||name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();nu.pw=pw;
      doLogin(nu);
    }else if(r2&&!r2.ok){
      showAerr(r2.data.error||'Registration failed.');btn.disabled=false;btn.textContent='Create account';
    }else{
      if(S.users.find(function(u){return u.email.toLowerCase()===email.toLowerCase();})){showAerr('Email already registered.');btn.disabled=false;btn.textContent='Create account';return;}
      var nu2={id:uid('u'),name:name,email:email,pw:pw,role:role,ini:name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase(),org:org};
      save('users',nu2);toast('ok','Account created locally (server offline).');doLogin(nu2);
    }
  }

async function _syncFromServer(){
  var r=await api('GET','/api/data');
  if(r&&r.ok&&r.data){
    STORES.forEach(function(store){
      if(Array.isArray(r.data[store])&&r.data[store].length){
        S[store]=r.data[store];
        var tx=DB.transaction(store,'readwrite'),os=tx.objectStore(store);

}

function svgBarChart(labs,revs,exps){
  var w=520,h=210,padL=46,padB=28,padT=14;
  var maxV=Math.max.apply(null,revs.concat(exps));
  if(maxV<=0)maxV=1;
  var plotW=w-padL-12,plotH=h-padT-padB;
  var groupW=plotW/labs.length;
  var barW=Math.min(34,groupW*0.32);
  var gap=barW*0.18;
  var svg='<svg width="100%" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="display:block;font-family:system-ui">';
  // gridlines + y labels
  var steps=4;
  for(var s=0;s<=steps;s++){
    var val=maxV*s/steps;
    var y=padT+plotH-(val/maxV)*plotH;
    svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(w-8)+'" y2="'+y+'" stroke="var(--bdr,#e5e7eb)" stroke-width="1"/>';
    svg+='<text x="'+(padL-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="var(--muted,#9ca3af)">'+Math.round(val).toLocaleString()+'</text>';
  }
  labs.forEach(function(lab,i){
    var cx=padL+groupW*i+groupW/2;
    var rH=(revs[i]/maxV)*plotH;
    var eH=(exps[i]/maxV)*plotH;
    var rx=cx-barW-gap/2;
    var ex=cx+gap/2;
    var ry=padT+plotH-rH;
    var ey=padT+plotH-eH;
    svg+='<rect x="'+rx+'" y="'+ry+'" width="'+barW+'" height="'+Math.max(rH,1)+'" rx="3" fill="#10B981"/>';
    svg+='<rect x="'+ex+'" y="'+ey+'" width="'+barW+'" height="'+Math.max(eH,1)+'" rx="3" fill="#EF4444"/>';
    svg+='<text x="'+cx+'" y="'+(h-8)+'" text-anchor="middle" font-size="10" fill="var(--muted,#6b7280)">'+lab+'</text>';
  });
  svg+='</svg>';
  return svg;
}

function svgDonutChart(labels,values,colors,centerLabel,centerValue){
  var total=values.reduce(function(a,b){return a+b;},0)||1;
  var cx=90,cy=90,r=78,ir=50;
  var svg='<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style="display:block;flex-shrink:0">';
  var ang=-Math.PI/2;
  values.forEach(function(v,i){
    if(v<=0)return;
    var frac=v/total;
    var a2=ang+frac*Math.PI*2;
    var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    var xi1=cx+ir*Math.cos(ang),yi1=cy+ir*Math.sin(ang);
    var xi2=cx+ir*Math.cos(a2),yi2=cy+ir*Math.sin(a2);
    var large=frac>0.5?1:0;
    svg+='<path d="M '+xi1+' '+yi1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+ir+' '+ir+' 0 '+large+' 0 '+xi1+' '+yi1+' Z" fill="'+colors[i]+'"/>';
    ang=a2;
  });
  if(centerLabel){
    svg+='<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" font-size="10" fill="var(--muted,#9ca3af)" font-family="system-ui">'+centerLabel+'</text>';
    svg+='<text x="'+cx+'" y="'+(cy+13)+'" text-anchor="middle" font-size="14" font-weight="700" fill="var(--text,#0D1B2A)" font-family="system-ui">'+(centerValue||'')+'</text>';
  }
  svg+='</svg>';
  var legend='<div style="display:flex;flex-direction:column;gap:9px;flex:1;min-width:0">';
  labels.forEach(function(lab,i){
    legend+='<div style="display:flex;align-items:center;gap:8px;font-size:12px"><span style="width:10px;height:10px;border-radius:3px;background:'+colors[i]+';flex-shrink:0;display:inline-block"></span><span style="flex:1;color:var(--text,#374151);font-weight:500">'+lab+'</span><span style="color:var(--text,#0D1B2A);font-weight:700;font-variant-numeric:tabular-nums">'+fmtM(values[i]*1000)+'</span></div>';
  });
  legend+='</div>';
  return '<div style="display:flex;align-items:center;gap:20px">'+svg+legend+'</div>';
}

  sp+='<path d="'+area+'" fill="url(#sg)"/>';

  spPts.forEach(function(p,i){

  html+=kpi('Gross Profit',fmtM(d.gross),'Margin: '+gpm+'%','up');
  html+=kpi('Net Profit',fmtM(d.pat),'Margin: '+npm+'%','up');
  html+=kpi('Alerts',overdue+' overdue',overdue>0?'needs attention':'all clear',overdue>0?'dn':'up');
  html+='</div>';

  var barSVG=svgBarChart(labs,revs.map(function(v){return Math.round(v/1000);}),exps.map(function(v){return Math.round(v/1000);}));
  var cogs=d.cogs_open+d.cogs_purch-d.cogs_close;
  var distK=Math.round(d.dist/1000),adminK=Math.round(d.admin/1000),finK=Math.round(d.fin_costs/1000),taxK=Math.round(d.tax/1000);
  var donutSVG=svgDonutChart(
    ['Distribution','Admin','Finance','Tax'],
    [distK,adminK,finK,taxK],
    ['var(--navy,#0D1B2A)','var(--amber,#F59E0B)','var(--green,#10B981)','var(--blue,#3B82F6)'],
    'Expenses','Rs '+(Math.round((distK+adminK+finK+taxK)/100)/10)+'M'
  );

  html+='<div class="card"><div class="ch"><span class="ct">Expense Mix FY'+G.fy.slice(2)+'</span></div><div style="padding:16px">'+donutSVG+'</div>'

    +'<div style="padding:11px 16px;border-right:.5px solid var(--bdr);border-bottom:.5px solid var(--bdr)"><div class="mut" style="text-transform:uppercase;font-size:10px;letter-spacing:.5px">GP Margin</div><div style="font-size:17px;font-weight:700;color:var(--text);margin-top:3px">'+gpm+'%</div></div>'
    +'<div style="padding:11px 16px;border-bottom:.5px solid var(--bdr)"><div class="mut" style="text-transform:uppercase;font-size:10px;letter-spacing:.5px">NP Margin</div><div style="font-size:17px;font-weight:700;color:var(--text);margin-top:3px">'+npm+'%</div></div>'

    +'<div style="padding:11px 16px"><div class="mut" style="text-transform:uppercase;font-size:10px;letter-spacing:.5px">Tax Rate</div><div style="font-size:17px;font-weight:700;color:var(--text);margin-top:3px">'+taxRate+'%</div></div>'
    +'</div></div>';
  html+='</div>';

  html+='<div class="g2">';
  html+='<div class="card"><div class="ch"><span class="ct">Net Profit Trend</span><span class="mut">3 Years</span></div><div style="padding:14px 14px 8px">'+sp+'</div></div>';
  html+='<div class="card"><div class="ch"><span class="ct">Balance Sheet Snapshot</span><button class="clink" data-nav="sofp" onclick="setView(this.dataset.nav)">Full Statement &rarr;</button></div>';
  html+='<div class="srow"><span class="slbl" style="font-weight:700">Total Assets</span><span class="sval">'+fmtM(d.bs.ppe_net+d.bs.intang+d.bs.invest_nc+d.bs.inv+d.bs.trade_rec+d.bs.adv+d.bs.cash)+'</span></div>';
  html+='<div class="srow"><span class="slbl">Non-current Assets</span><span class="sval">'+fmtM(d.bs.ppe_net+d.bs.intang+d.bs.invest_nc)+'</span></div>';
  html+='<div class="srow"><span class="slbl">Current Assets</span><span class="sval">'+fmtM(d.bs.inv+d.bs.trade_rec+d.bs.adv+d.bs.cash)+'</span></div>';
  html+='<div class="srow"><span class="slbl" style="font-weight:700">Total Equity</span><span class="sval grn">'+fmtM(d.bs.sh_cap+d.bs.res+d.bs.ret_earn)+'</span></div>';
  html+='<div class="srow"><span class="slbl">Total Liabilities</span><span class="sval red">'+fmtM(d.bs.lt_loan+d.bs.def_tax+d.bs.st_loan+d.bs.trade_pay+d.bs.accr+d.bs.tax_pay)+'</span></div>';
  html+='<div class="srow"><span class="slbl">1 USD (live)</span><span class="sval">Rs '+G.rates.USD+'</span></div>';
  html+='</div></div>';

  return html;
}

function priorRatio(){
  var yrs=['2026','2025','2024'];

  function tl(y){var b=FY[y].bs;return b.lt_loan+b.def_tax+b.st_loan+b.trade_pay+b.accr+b.tax_pay;}

function runDepreciation(){
  var count=0;
  S.assets.forEach(function(a){
    if(a.nbv>0){
      a.adop=a.adcl;
      a.dyr=Math.round(a.cost*a.rate/100);
      a.adcl=Math.min(a.adop+a.dyr,a.cost);
      a.nbv=Math.max(0,a.cost-a.adcl);
      save('assets',a);
      var je={id:uid('TXN'),ref:uid('DEP'),desc:'Depreciation — '+a.desc,acct:'6400',dr:a.dyr,cr:0,date:today(),status:'posted',by:G.user?G.user.name:'System',att:[],hash:Math.random().toString(16).slice(2,10).toUpperCase(),fy:G.fy};
      save('txns',je);
      count++;
    }
  });
  addLog('Ran automated depreciation for '+count+' assets. Journal entries posted.','posted');
  toast('ok','Depreciation run complete. '+count+' assets updated. Journal entries posted to General Ledger.');
  setTimeout(function(){setView('far');},100);
}

function resetDB(){
  if(!confirm('Reset all data to default seed values? This cannot be undone.'))return;
  var tx=DB.transaction(STORES,'readwrite');
  STORES.forEach(function(s){tx.objectStore(s).clear();});
  tx.oncomplete=function(){seedIfEmpty(function(){loadAll(function(){toast('ok','Database reset to seed data.');setView('dashboard');});});};
}
function exportData(){
  var out={};Object.keys(S).forEach(function(k){out[k]=S[k];});
  var b=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='aqsam-export-'+today()+'.json';a.click();
  toast('ok','Data exported successfully.');
}
function importData(file){
  if(!file){return;}
  if(!confirm('Restore from this backup? This will overwrite all current data.'))return;
  var reader=new FileReader();
  reader.onload=function(e){
    var data;
    try{ data=JSON.parse(e.target.result); }catch(err){ toast('er','Invalid backup file.'); return; }
    var tx=DB.transaction(STORES,'readwrite');
    STORES.forEach(function(s){ tx.objectStore(s).clear(); });
    tx.oncomplete=function(){
      var writes=STORES.filter(function(s){return Array.isArray(data[s]);}).map(function(s){
        return new Promise(function(res){
          var t=DB.transaction(s,'readwrite'),os=t.objectStore(s);
          data[s].forEach(function(rec){ os.put(rec); });
          t.oncomplete=res;
        });
      });
      Promise.all(writes).then(function(){
        loadAll(function(){ toast('ok','Backup restored successfully.'); setView('dashboard'); });
      });
    };
  };
  reader.readAsText(file);
}
function clearAudit(){if(!confirm('Clear audit trail?'))return;S.audit=[];var tx=DB.transaction('audit','readwrite');tx.objectStore('audit').clear();tx.oncomplete=function(){toast('ok','Audit trail cleared.');setView('settings');};}

// ── CREATE FUNCTIONS ──────────────────────────────────────────
async function postJE(){
  var desc=gv('jd'),dr=gv('jdr'),cr=gv('jcr'),amt=parseFloat(gv('jamt'))||0,dt=gv('jdate')||today(),notes=gv('jnotes');
  if(!desc||!amt){toast('er','Fill description and amount.');return;}
  var jid=uid('JRN');
  save('journals',{id:jid,desc:desc,dr_acct:dr,cr_acct:cr,amount:amt,date:dt,notes:notes,status:'posted',by:G.user?G.user.name:'System'});
  var base={date:dt,status:'posted',by:G.user?G.user.name:'System',att:[],hash:Math.random().toString(16).slice(2,10).toUpperCase(),fy:G.fy};
  save('txns',Object.assign({},base,{id:uid('TXN'),ref:jid,desc:desc+' (Dr: '+dr+')',acct:dr,dr:amt,cr:0}));
  save('txns',Object.assign({},base,{id:uid('TXN'),ref:jid,desc:desc+' (Cr: '+cr+')',acct:cr,dr:0,cr:amt}));
  var r=await api('POST','/api/transactions',{description:desc,account:dr,amount:amt,type:'expense',txn_date:dt,fy_year:G.fy,note:notes});
  addLog('Posted journal '+jid+' Dr:'+dr+' Cr:'+cr+' Rs '+fmt(amt),'posted');
  toast('ok',r&&r.ok?'Journal posted to server — '+r.data.ref:'Journal posted locally'+(r?'':' (offline)')+'. Dr & Cr created.');cM();
}
async function createInv(send){
  var desc=gv('iv-desc'),qty=parseFloat(gv('iv-qty'))||1,rate=parseFloat(gv('iv-rate'))||0,cid=gv('iv-c'),dt=gv('iv-dt'),dd=gv('iv-dd'),cur=gv('iv-cur'),notes=gv('iv-notes');
  if(!desc||!rate){toast('er','Fill description and rate.');return;}
  var custObj=S.customers.find(function(c){return c.id==cid;});
  var cDbId=custObj&&custObj._sid?custObj._sid:cid||1;
  var r=await api('POST','/api/invoices',{customer_id:cDbId,issue_date:dt,due_date:dd,currency:cur,notes:notes,items:[{description:desc,qty:qty,unit_price:rate,tax_pct:0}]});
  var id;
  if(r&&r.ok){id=r.data.ref;save('invoices',{id:id,cust:cid,date:dt,due:dd,items:[{desc:desc,qty:qty,rate:rate}],status:send?'sent':'draft',cur:cur,att:[],notes:notes,_sid:r.data.id});if(send)await api('PATCH','/api/invoices/'+r.data.id,{status:'sent'});toast('ok','Invoice '+id+(send?' sent':' drafted')+' on server.');}
  else{id=uid('INV');save('invoices',{id:id,cust:cid,date:dt,due:dd,items:[{desc:desc,qty:qty,rate:rate}],status:send?'sent':'draft',cur:cur,att:[],notes:notes});toast('ok','Invoice '+id+' saved locally.');}
  addLog((send?'Sent':'Drafted')+' invoice '+id+' '+fmt(qty*rate),'posted');cM();setView('invoices');
}
async function createBill(){
  var amt=parseFloat(gv('bl-amt'))||0,vid=gv('bl-v'),dt=gv('bl-dt'),dd=gv('bl-dd'),acct=gv('bl-acct'),ref=gv('bl-ref');
  if(!amt){toast('er','Enter amount.');return;}
  var vendObj=S.vendors.find(function(v){return v.id==vid;});
  var vDbId=vendObj&&vendObj._sid?vendObj._sid:vid||1;
  var r=await api('POST','/api/bills',{vendor_id:vDbId,bill_date:dt,due_date:dd,amount:amt,account:acct,notes:ref});
  var id;
  if(r&&r.ok){id=r.data.ref;save('bills',{id:id,vendor:vid,date:dt,due:dd,amount:amt,status:'pending',acct:acct,ref:ref,att:[],notes:'',_sid:r.data.id});toast('ok','Bill '+id+' on server.');}
  else{id=uid('BILL');save('bills',{id:id,vendor:vid,date:dt,due:dd,amount:amt,status:'pending',acct:acct,ref:ref,att:[],notes:''});toast('ok','Bill saved locally.');}
  addLog('Recorded bill '+id+' '+fmt(amt),'posted');cM();setView('bills');
}
function createCust(){
  var name=gv('cu-n');if(!name){toast('er','Enter customer name.');return;}
  var c={id:uid('C'),name:name,email:gv('cu-e'),phone:gv('cu-p'),country:gv('cu-c'),cur:gv('cu-cur'),balance:0,status:'active',credit:parseFloat(gv('cu-cl'))||0,ytd:0,since:today(),ntn:gv('cu-ntn')};
  save('customers',c);addLog('Added customer '+name,'posted');toast('ok','Customer added.');cM();setView('customers');
}
function createVend(){
  var name=gv('vd-n');if(!name){toast('er','Enter vendor name.');return;}
  save('vendors',{id:uid('V'),name:name,email:gv('vd-e'),phone:gv('vd-p'),balance:0,status:'active',cat:gv('vd-c'),terms:gv('vd-t')});
  addLog('Added vendor '+name,'posted');toast('ok','Vendor added.');cM();setView('vendors');
}
function createEmp(){
  var name=gv('em-n');if(!name){toast('er','Enter employee name.');return;}
  save('employees',{id:uid('EMP'),name:name,ni:gv('em-ni'),email:gv('em-e'),phone:gv('em-ph'),dob:'',gender:'',dept:gv('em-d'),role:gv('em-r'),join:gv('em-j'),sal:parseFloat(gv('em-s'))||0,bank:gv('em-b'),acct:gv('em-a'),taxno:'Pending',eobi:'Pending',status:'active'});
  addLog('Added employee '+name,'posted');toast('ok','Employee added to HR.');cM();setView('employees');
}
function createItem(){
  var name=gv('it-n');if(!name){toast('er','Enter item name.');return;}
  var qty=parseInt(gv('it-q'))||0,reorder=parseInt(gv('it-r'))||5;
  save('inventory',{id:uid('ITM'),name:name,sku:gv('it-s'),cat:gv('it-c'),qty:qty,cost:parseFloat(gv('it-co'))||0,reorder:reorder,unit:gv('it-u'),status:qty===0?'out':qty<=reorder?'low':'ok'});
  addLog('Added inventory item '+name,'posted');toast('ok','Item added to inventory.');cM();setView('inventory');
}
function createExp(){
  var amt=parseFloat(gv('ex-a'))||0,desc=gv('ex-d');
  if(!desc||!amt){toast('er','Fill amount and description.');return;}
  save('expenses',{id:uid('EXP'),emp:G.user?G.user.name:'Unknown',cat:gv('ex-c'),amount:amt,date:gv('ex-dt'),desc:desc,status:'pending',proj:''});
  addLog('Expense claim submitted '+fmt(amt),'posted');toast('ok','Claim submitted for approval.');cM();setView('expenses');
}
function createProj(){
  var name=gv('pj-n');if(!name){toast('er','Enter project name.');return;}
  save('projects',{id:uid('PRJ'),name:name,client:gv('pj-c'),budget:parseFloat(gv('pj-b'))||0,spent:0,status:'active',start:gv('pj-s'),end:gv('pj-e'),pm:gv('pj-pm')});
  addLog('Created project '+name,'posted');toast('ok','Project created.');cM();setView('projects');
}
function createAsset(){
  var desc=gv('as-d'),cost=parseFloat(gv('as-cost'))||0;if(!desc||!cost){toast('er','Fill description and cost.');return;}
  var rate=parseFloat(gv('as-rate'))||10;
  var dyr=Math.round(cost*rate/100);
  save('assets',{id:uid('FA'),desc:desc,cat:gv('as-cat'),acq:gv('as-acq'),cost:cost,life:parseInt(gv('as-life'))||10,method:gv('as-meth'),rate:rate,adop:0,dyr:dyr,adcl:dyr,nbv:cost-dyr,loc:gv('as-loc'),status:'active'});
  addLog('Added fixed asset: '+desc,'posted');toast('ok','Asset added to Fixed Asset Register.');cM();setView('far');
}

function toggleDark(){
  var on=document.documentElement.getAttribute('data-theme')==='dark';
  if(on){document.documentElement.removeAttribute('data-theme');localStorage.setItem('aqsam_theme','light');var b=E('dmtoggle');if(b)b.innerHTML='&#9790;';}
  else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('aqsam_theme','dark');var b2=E('dmtoggle');if(b2)b2.innerHTML='&#9728;';}
  if(G.view==='dashboard')setTimeout(function(){setView('dashboard');},80);
}
function applyTheme(){
  var t=localStorage.getItem('aqsam_theme');
  if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');setTimeout(function(){var b=E('dmtoggle');if(b)b.innerHTML='&#9728;';},300);}
}
applyTheme();
initDB(function(){tryAutoLogin();});
// ── Server settings helpers (avoids quote-in-string issues) ──
function saveServerUrl(){
  var inp=document.getElementById('srv-url');
  if(!inp||!inp.value.trim()){toast('er','Enter a valid server URL.');return;}
  API_URL=inp.value.trim();
  localStorage.setItem('aqsam_api',API_URL);
  var db=document.getElementById('db-badge'); if(db) db.textContent='IndexedDB + Server';
  toast('ok','Server URL saved. Syncing...');
  _syncFromServer();
  _wsConnect();
}
function manualSync(){
  if(!API_URL){ toast('ok','Running local-only — no server configured. Add one in Settings to enable sync.'); return; }
  toast('ok','Syncing from server...');
  _syncFromServer();
}
